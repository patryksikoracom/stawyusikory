name: Stawy OS operations cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: stawy-os-operations-cron
  cancel-in-progress: false

jobs:
  synchronize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Synchronize iCal feeds
        env:
          APP_URL: ${{ secrets.STAWY_OS_APP_URL }}
          CRON_SECRET: ${{ secrets.STAWY_OS_CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"
          curl --fail --silent --show-error --retry 2 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/integrations/ical/sync"

      - name: Retry queued SMS messages
        if: ${{ secrets.STAWY_OS_SMS_ENABLED == 'true' }}
        env:
          APP_URL: ${{ secrets.STAWY_OS_APP_URL }}
          CRON_SECRET: ${{ secrets.STAWY_OS_CRON_SECRET }}
        run: |
          curl --fail --silent --show-error --retry 2 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/messages/sms/process"
